[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "istanbul"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
monad  = "${MONAD_RPC}"
mainnet = "${ETH_RPC}"
base    = "${BASE_RPC}"

[etherscan]
monad = { key = "${MONAD_EXPLORER_KEY}", url = "https://testnet.monadscan.com/api" }
