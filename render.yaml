services:
  - type: web
    name: somnia-agent-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack pnpm install --frozen-lockfile=false && corepack pnpm build:api
    startCommand: corepack pnpm --filter @somnia-agent/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: FRONTEND_URL
        value: https://somnia-agent.vercel.app
      - key: CORS_ORIGINS
        value: https://somnia-agent.vercel.app
      - key: SOMNIA_RPC
        value: https://api.infra.testnet.somnia.network/
      - key: SOMNIA_RPC_FALLBACK
        value: https://dream-rpc.somnia.network
      - key: NEXT_PUBLIC_ETH_RPC
        value: https://rpc.ankr.com/eth
      - key: NEXT_PUBLIC_BASE_RPC
        value: https://rpc.ankr.com/base
      - key: NEXT_PUBLIC_ARB_RPC
        value: https://rpc.ankr.com/arbitrum
      - key: SOMNIA_CHAIN_ID
        value: "50312"
      - key: SOMNIA_EXPLORER_URL
        value: https://shannon-explorer.somnia.network
      - key: OPENAI_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: ETH_USD_PRICE
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ONEINCH_API_KEY
        sync: false
      - key: ZEROX_API_KEY
        sync: false

  - type: web
    name: somnia-agent-agent
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack pnpm install --frozen-lockfile=false && corepack pnpm build:agent
    startCommand: corepack pnpm --filter @somnia-agent/agent start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: FRONTEND_URL
        value: https://somnia-agent.vercel.app
      - key: CORS_ORIGINS
        value: https://somnia-agent.vercel.app
      - key: API_URL
        value: https://somnia-agent.onrender.com
      - key: SOMNIA_RPC
        value: https://api.infra.testnet.somnia.network/
      - key: SOMNIA_RPC_FALLBACK
        value: https://dream-rpc.somnia.network
      - key: NEXT_PUBLIC_ETH_RPC
        value: https://rpc.ankr.com/eth
      - key: NEXT_PUBLIC_BASE_RPC
        value: https://rpc.ankr.com/base
      - key: NEXT_PUBLIC_ARB_RPC
        value: https://rpc.ankr.com/arbitrum
      - key: SOMNIA_CHAIN_ID
        value: "50312"
      - key: SOMNIA_EXPLORER_URL
        value: https://shannon-explorer.somnia.network
      - key: OPENAI_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: EXECUTION_PROXY_ADDRESS
        value: 0x62ABDCFab87fbE9D66893C389C7D1B8AF6ffb9E5
